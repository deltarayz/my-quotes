<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Quote Widget</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: transparent;
            text-align: center;
            box-sizing: border-box;
        }
        #quote-container {
            max-width: 500px;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .quote {
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.5;
            color: #37352f;
            margin-bottom: 8px;
        }
        .author {
            font-size: 0.9rem;
            color: #787774;
            font-style: italic;
            margin-bottom: 20px;
        }
        /* Minimalist Circular Emoji Button */
        .next-btn {
            background-color: rgba(55, 53, 47, 0.04);
            border: none;
            width: 32px;
            height: 32px;
            font-size: 1rem;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease, transform 0.2s ease;
            user-select: none;
        }
        .next-btn:hover {
            background-color: rgba(55, 53, 47, 0.08);
            transform: scale(1.05);
        }
        .next-btn:active {
            transform: scale(0.95);
        }
        /* Dark Mode Compatibility */
        @media (prefers-color-scheme: dark) {
            .quote { color: #ebeeee; }
            .author { color: #9b9b9b; }
            .next-btn {
                background-color: rgba(255, 255, 255, 0.05);
            }
            .next-btn:hover {
                background-color: rgba(255, 255, 255, 0.1);
            }
        }
    </style>
</head>
<body>

    <div id="quote-container">
        <div class="quote" id="quote">Loading...</div>
        <div class="author" id="author"></div>
        <button class="next-btn" onclick="loadNextQuote()">🔄</button>
    </div>

    <script>
        // 1. ADD YOUR CUSTOM QUOTES HERE
        const quotesList = [
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { text: "Done is better than perfect.", author: "Sheryl Sandberg" },
            { text: "Code is like humor. When you have to explain it, it’s bad.", author: "Cory House" },
            { text: "‘現實’只能靠輸出改變.", author: "" },
            { text: "Aim for progress, not perfection.", author: "" },
            { text: "Live your best life, sink or swim, do or die.", author: "" },
            { text: "Knowing the right question >  knowing the right answer.", author: "" },
            { text: "You can’t control the wind, but you can control the sail.", author: "" },
            { text: "If you don’t know the direction you are sailing to, no wind is favorable.", author: "" },
            { text: "You can’t be normal and expect abnormal result.", author: "" },
            { text: "Make it a goal to inspire someone to be their natural best.", author: "" },
            { text: "Set system, not goal.", author: "" },
            { text: "Tell the time, don't build the clock.", author: "" },
            { text: "What, so what, now what.", author: "" },
            { text: "Replace judgement with curiosity.", author: "" },
            { text: "不要急著給建議；有時，只需要複述與聆聽, let them empty the bucket and feel heard", author: "" },
            { text: "Active Listening: What am I missing?", author: "" },
            { text: "Active LISTEN = Be SILENT.", author: "" },
            { text: "When in conflict, ask questions → summarize what you heard → ask if you get it correctly. Repeat until they feel heard..", author: "" },
            { text: "To come up with a perfect plan, one first needs to be able to generate many plans..", author: "" },
            { text: "The days are long, but the decades are short.", author: "" },
            { text: "I'm giving you these comments because I have very high expectations, and I'm confident you can reach them.", author: "" },
            { text: "‘Vision’ is not about having grand ideas, it’s about solving problems.", author: "" },
            { text: "It gets easier once you get started.", author: "" },
            { text: "Leadership = Transitioning from ‘seeking approval’ from the boss, to ‘guiding decisions’ .", author: "" },
            { text: "Prepare the child for the road, not the road for the child.", author: "" },
            { text: "開發一個可複製的系統的關鍵在於成敗歸因.", author: "" },
            { text: "‘如果你要讓一個人學會造船，你不需要真的一步一步教他，你只需要激起他對海洋的嚮往.", author: "" },
            { text: "Use 'conflict' as the hook for storytelling.", author: "" },
            { text: "Reflection is not about finding mistakes - it’s about identifying advantage, method, and contribution.", author: "" },
            { text: "焦慮的解藥是目標拆解.", author: "" },
            { text: "焦慮是運用想象力最糟糕的方式.", author: "" },
            { text: "必須做但是不想做的事情：不帶情緒地做.", author: "梁爽" },
            { text: "Just find someone, and seek feedback.", author: "" }
        ];

        let lastIndex = -1;

        function getRandomQuote() {
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * quotesList.length);
            } while (randomIndex === lastIndex && quotesList.length > 1);
            
            lastIndex = randomIndex;
            return quotesList[randomIndex];
        }

        function displayQuote() {
            const container = document.getElementById('quote-container');
            const quoteText = document.getElementById('quote');
            const authorText = document.getElementById('author');
            
            const selectedQuote = getRandomQuote();
            
            quoteText.innerText = `“${selectedQuote.text}”`;
            authorText.innerText = selectedQuote.author ? `— ${selectedQuote.author}` : '';
            
            container.style.opacity = 1;
        }

        function loadNextQuote() {
            const container = document.getElementById('quote-container');
            container.style.opacity = 0;
            setTimeout(() => {
                displayQuote();
            }, 400); 
        }

        window.onload = displayQuote;
    </script>
</body>
</html>
